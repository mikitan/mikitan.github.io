<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐾 ポメラニアン椅子取りゲーム</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Kaisei+Decol:wght@700&family=M+PLUS+Rounded+1c:wght@400;700;800&display=swap');

:root {
  --cream:  #fff8f0;
  --peach:  #ffcba4;
  --orange: #ff7c2a;
  --red:    #ff3d5a;
  --gold:   #ffcc00;
  --brown:  #7a3b0a;
  --shadow: rgba(120,50,0,0.18);
}
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'M PLUS Rounded 1c','Hiragino Maru Gothic Pro',sans-serif;
  background: var(--cream);
  min-height: 100vh;
  overflow-x: hidden;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px 16px 40px;
  position: relative;
}
body::before {
  content:'';
  position:fixed;inset:0;
  background:
    radial-gradient(circle at 20% 20%,#ffe0c8 0%,transparent 50%),
    radial-gradient(circle at 80% 80%,#ffd4b0 0%,transparent 50%);
  z-index:0;
}

/* 浮かぶ肉球 */
.paw-bg {
  position:fixed; opacity:0.06; pointer-events:none; z-index:0;
  animation: floatPaw linear infinite;
}
@keyframes floatPaw {
  from { transform:translateY(110vh) rotate(0deg); }
  to   { transform:translateY(-10vh) rotate(360deg); }
}

/* タイトル */
#title-area { position:relative;z-index:1;text-align:center;margin-bottom:10px; }
h1 {
  font-family:'Kaisei Decol',serif;
  font-size:clamp(1.5rem,5.5vw,2.4rem);
  color:var(--brown);
  text-shadow:3px 3px 0 var(--peach),5px 5px 0 rgba(120,50,0,.1);
  line-height:1.2;
}
.subtitle { font-size:.8rem;color:var(--orange);margin-top:4px;letter-spacing:.1em; }

/* ステータス */
#status {
  position:relative;z-index:1;
  font-size:1rem;font-weight:800;color:var(--brown);
  background:white;border:3px solid var(--peach);border-radius:50px;
  padding:7px 22px;margin-bottom:12px;text-align:center;
  box-shadow:0 4px 14px var(--shadow);transition:background .3s,color .3s;
  min-width:240px;
}
#status.danger {
  background:var(--red);color:white;border-color:#c00030;
  animation:statusPulse .5s ease infinite alternate;
}
@keyframes statusPulse {
  from{transform:scale(1)} to{transform:scale(1.03)}
}

/* スコアバー */
#scorebar {
  position:relative;z-index:1;
  display:flex;justify-content:center;gap:16px;margin-bottom:12px;
  font-size:.85rem;font-weight:800;color:var(--brown);
}
.score-item {
  background:white;border:2px solid var(--peach);border-radius:14px;
  padding:5px 14px;box-shadow:0 3px 8px var(--shadow);
}
.score-item span{font-size:1.1rem;}

/* ラウンドバッジ */
#round-badge {
  position:relative;z-index:1;
  display:inline-block;background:var(--gold);color:var(--brown);
  font-weight:800;font-size:.75rem;padding:3px 14px;border-radius:50px;
  margin-bottom:8px;box-shadow:0 2px 8px rgba(180,140,0,.3);letter-spacing:.1em;
}

/* ゲームエリア */
#game-area {
  position:relative;z-index:1;
  width:100%;max-width:480px;
  background:white;border-radius:28px;
  box-shadow:0 8px 32px var(--shadow);
  padding:18px;margin-bottom:16px;
  border:3px solid var(--peach);
}

/* 円形ステージ（canvas親） */
#stage-wrap {
  position:relative;
  width:300px;height:300px;
  margin:0 auto 14px;
}
#stage-canvas {
  position:absolute;top:0;left:0;
  border-radius:50%;
}
/* ポメ絵文字は canvas の上に absoluteで乗せる */
.pom-el {
  position:absolute;
  font-size:2rem;
  width:44px;height:44px;
  display:flex;align-items:center;justify-content:center;
  transform:translate(-50%,-50%);
  pointer-events:none;
  transition:opacity .4s;
  filter:drop-shadow(0 3px 6px rgba(0,0,0,.15));
  user-select:none;
}
.pom-el.eliminated { opacity:0; }
.pom-name-el {
  position:absolute;
  font-size:.48rem;font-weight:800;color:#a06030;
  white-space:nowrap;
  transform:translate(-50%,-50%);
  pointer-events:none;
}

/* 椅子スコア */
#chair-score-row {
  display:flex;justify-content:center;gap:4px;
  min-height:1.8rem;font-size:1.2rem;
}

/* コントロール */
#controls {
  position:relative;z-index:1;
  display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-bottom:14px;
}
button {
  padding:12px 24px;border:none;border-radius:50px;
  font-size:.9rem;font-weight:800;cursor:pointer;
  transition:all .18s;box-shadow:0 5px 14px var(--shadow);
  font-family:inherit;letter-spacing:.05em;
}
button:active{transform:scale(.93) translateY(2px);}
#btnStart{background:linear-gradient(135deg,#ff9a4a,#ff5500);color:white;border-bottom:4px solid #c23d00;}
#btnStop {background:linear-gradient(135deg,#ff4d6d,#c9184a);color:white;border-bottom:4px solid #8b0a30;}
#btnStop.pulse{animation:btnPulse .7s ease-in-out infinite alternate;}
@keyframes btnPulse{
  from{box-shadow:0 5px 18px rgba(201,24,74,.4);transform:scale(1);}
  to  {box-shadow:0 5px 30px rgba(255,0,60,.7); transform:scale(1.05);}
}
#btnReset{background:linear-gradient(135deg,#a8e6cf,#56cba2);color:#0a5c3a;border-bottom:4px solid #2d9168;}
button:disabled{opacity:.35;cursor:not-allowed;transform:none!important;box-shadow:none!important;border-bottom:4px solid transparent;animation:none!important;}

/* 結果 */
#result {
  position:relative;z-index:1;
  font-size:1.3rem;font-weight:800;color:var(--brown);
  text-align:center;min-height:2.2em;
}

/* 音符エフェクト */
.note-fx {
  position:fixed;pointer-events:none;z-index:100;
  animation:noteFly 1.4s ease-out forwards;
}
@keyframes noteFly {
  0%  {opacity:1;transform:translateY(0) scale(1);}
  100%{opacity:0;transform:translateY(-80px) scale(.5);}
}

/* 爆発 */
#effect-overlay{position:fixed;inset:0;pointer-events:none;z-index:200;}
.boom{position:absolute;font-size:2.5rem;animation:boomAnim .8s ease-out forwards;}
@keyframes boomAnim{
  0%  {opacity:1;transform:scale(.5);}
  50% {opacity:1;transform:scale(1.6);}
  100%{opacity:0;transform:scale(.8) translateY(-30px);}
}

/* 紙吹雪 */
#confetti-area{position:fixed;inset:0;pointer-events:none;z-index:300;overflow:hidden;}
.confetti-piece{
  position:absolute;top:-20px;width:10px;height:14px;border-radius:3px;
  animation:confettiFall linear forwards;
}
@keyframes confettiFall{
  0%  {transform:translateY(0) rotate(0deg) scale(1);opacity:1;}
  100%{transform:translateY(110vh) rotate(720deg) scale(.7);opacity:0;}
}

/* 音楽インジケーター */
#music-indicator{
  position:fixed;top:12px;right:12px;z-index:400;
  display:flex;flex-direction:column;align-items:center;gap:3px;
  opacity:0;transition:opacity .3s;
}
#music-indicator.on{opacity:1;}
.bar-wrap{display:flex;align-items:flex-end;gap:3px;height:22px;}
.bar{width:5px;background:var(--orange);border-radius:3px;animation:barAnim .6s ease-in-out infinite alternate;}
.bar:nth-child(1){animation-delay:0s}
.bar:nth-child(2){animation-delay:.15s}
.bar:nth-child(3){animation-delay:.08s}
.bar:nth-child(4){animation-delay:.22s}
@keyframes barAnim{from{height:6px;opacity:.7}to{height:20px;opacity:1}}
#music-label{font-size:.58rem;font-weight:800;color:var(--orange);letter-spacing:.08em;}
</style>
</head>
<body>

<div id="paw-container"></div>
<div id="music-indicator">
  <div class="bar-wrap">
    <div class="bar"></div><div class="bar"></div>
    <div class="bar"></div><div class="bar"></div>
  </div>
  <div id="music-label">♪ ON AIR</div>
</div>
<div id="confetti-area"></div>
<div id="effect-overlay"></div>

<div id="title-area">
  <h1>🐾 ポメラニアン<br>椅子取りゲーム 🐾</h1>
  <div class="subtitle">POMERANIAN MUSICAL CHAIRS</div>
</div>

<div id="round-badge">ROUND 1</div>
<div id="status">「スタート」を押して始めよう！</div>

<div id="scorebar">
  <div class="score-item">🐕 残り <span id="sc-pom">6</span>匹</div>
  <div class="score-item">🪑 椅子 <span id="sc-chair">5</span>脚</div>
</div>

<div id="game-area">
  <div id="stage-wrap">
    <canvas id="stage-canvas" width="300" height="300"></canvas>
    <!-- ポメ絵文字はJSで動的追加 -->
  </div>
  <div id="chair-score-row"></div>
</div>

<div id="controls">
  <button id="btnStart">🎵 スタート！</button>
  <button id="btnStop" disabled>🛑 ストップ！</button>
  <button id="btnReset">🔄 リセット</button>
</div>
<div id="result"></div>

<script>
// ───────── 背景肉球 ─────────
const PAWS=['🐾','🐕','🦴','💛','🌸'];
for(let i=0;i<14;i++){
  const el=document.createElement('div');
  el.className='paw-bg';
  el.textContent=PAWS[Math.floor(Math.random()*PAWS.length)];
  el.style.cssText=`left:${Math.random()*100}vw;font-size:${1.2+Math.random()*2}rem;animation-duration:${12+Math.random()*20}s;animation-delay:${-Math.random()*20}s`;
  document.getElementById('paw-container').appendChild(el);
}

// ───────── Audio ─────────
let audioCtx=null,musicNodes=[],musicPlaying=false,loopTimer=null,noteEffTimer=null;
function getCtx(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
function noteToHz(name){
  const N={C:0,'C#':1,D:2,'D#':3,E:4,F:5,'F#':6,G:7,'G#':8,A:9,'A#':10,B:11};
  const m=name.match(/^([A-G]#?)(\d)$/);if(!m)return 440;
  return 440*Math.pow(2,(N[m[1]]+(parseInt(m[2])-4)*12)/12);
}
function playNote(ctx,freq,t,dur,gain,type='square',detune=0){
  const osc=ctx.createOscillator(),env=ctx.createGain(),flt=ctx.createBiquadFilter();
  flt.type='lowpass';flt.frequency.value=2200;
  osc.type=type;osc.frequency.setValueAtTime(freq,t);
  if(detune)osc.detune.setValueAtTime(detune,t);
  env.gain.setValueAtTime(0,t);env.gain.linearRampToValueAtTime(gain,t+.015);
  env.gain.setValueAtTime(gain,t+dur*.65);env.gain.exponentialRampToValueAtTime(.001,t+dur);
  osc.connect(flt);flt.connect(env);env.connect(ctx.destination);
  osc.start(t);osc.stop(t+dur+.05);musicNodes.push(osc);
}
const BPM=168,B=60/BPM;
const MEL=[['A4',B/2],['C5',B/2],['E5',B/2],['A5',B/2],['G5',B/2],['F5',B/4],['E5',B/4],['D5',B/2],['E5',B/4],['F5',B/4],['E5',B/4],['D5',B/4],['C5',B/2],['E5',B/2],['D5',B/4],['C5',B/4],['B4',B],['A4',B/2],['B4',B/4],['C5',B/4],['D5',B/2],['E5',B/2],['F5',B/4],['E5',B/4],['D5',B/4],['C5',B/4],['B4',B/2],['A4',B/2],['G4',B/4],['A4',B/4],['B4',B/4],['C5',B/4],['D5',B/2],['E5',B/2],['A4',B*2]];
const CNT=[['E5',B/4],['E5',B/4],['F5',B/4],['E5',B/4],['D5',B/4],['D5',B/4],['E5',B/4],['D5',B/4],['C5',B/4],['C5',B/4],['D5',B/4],['C5',B/4],['B4',B],['E5',B/4],['F5',B/4],['G5',B/4],['F5',B/4],['E5',B/4],['D5',B/4],['C5',B/4],['B4',B/4],['A4',B/2],['C5',B/2],['E5',B],['A4',B*2]];
const BASS=[['A2',B],['A2',B],['G2',B],['G2',B],['F2',B],['F2',B],['E2',B],['E2',B]];

function scheduleThrilling(ctx,t0){
  const total=MEL.reduce((s,n)=>s+n[1],0);
  let t=t0;
  for(const[n,d]of MEL){playNote(ctx,noteToHz(n),t,d*.85,.22,'square');t+=d;}
  t=t0;
  for(const[n,d]of CNT){playNote(ctx,noteToHz(n),t,d*.7,.10,'sawtooth',-7);t+=d;}
  t=t0;let el=0;
  while(el<total){for(const[n,d]of BASS){if(el>=total)break;playNote(ctx,noteToHz(n),t,d*.8,.28,'sine');playNote(ctx,noteToHz(n)*2,t,d*.8,.09,'triangle');t+=d;el+=d;}}
  const k=B/2;
  for(let i=0;i*k<total;i++){
    const ct=t0+i*k;
    if(i%4===0||i%4===2){const o=ctx.createOscillator(),e=ctx.createGain();o.type='sine';o.frequency.setValueAtTime(160,ct);o.frequency.exponentialRampToValueAtTime(28,ct+.13);e.gain.setValueAtTime(.9,ct);e.gain.exponentialRampToValueAtTime(.001,ct+.16);o.connect(e);e.connect(ctx.destination);o.start(ct);o.stop(ct+.2);musicNodes.push(o);}
    if(i%4===1||i%4===3){const buf=ctx.createBuffer(1,Math.floor(ctx.sampleRate*.12),ctx.sampleRate);const d=buf.getChannelData(0);for(let j=0;j<d.length;j++)d[j]=(Math.random()*2-1)*(1-j/d.length);const src=ctx.createBufferSource(),e=ctx.createGain();src.buffer=buf;e.gain.setValueAtTime(.32,ct);e.gain.exponentialRampToValueAtTime(.001,ct+.12);src.connect(e);e.connect(ctx.destination);src.start(ct);musicNodes.push(src);}
    const hb=ctx.createBuffer(1,Math.floor(ctx.sampleRate*.04),ctx.sampleRate);const hd=hb.getChannelData(0);for(let j=0;j<hd.length;j++)hd[j]=(Math.random()*2-1);const hs=ctx.createBufferSource(),hf=ctx.createBiquadFilter(),he=ctx.createGain();hf.type='highpass';hf.frequency.value=8000;hs.buffer=hb;he.gain.setValueAtTime(.10,ct);he.gain.exponentialRampToValueAtTime(.001,ct+.04);hs.connect(hf);hf.connect(he);he.connect(ctx.destination);hs.start(ct);musicNodes.push(hs);
  }
  return total;
}
function startMusic(){
  if(musicPlaying)return;
  musicPlaying=true;
  document.getElementById('music-indicator').classList.add('on');
  const ctx=getCtx();if(ctx.state==='suspended')ctx.resume();
  function loop(){const dur=scheduleThrilling(ctx,ctx.currentTime);loopTimer=setTimeout(loop,(dur-.08)*1000);}
  loop();
  btnStop.classList.add('pulse');
  const notes=['🎵','🎶','♪','🎼','🎸'];
  noteEffTimer=setInterval(()=>{
    if(!musicPlaying)return;
    const el=document.createElement('div');el.className='note-fx';
    el.textContent=notes[Math.floor(Math.random()*notes.length)];
    el.style.left=(10+Math.random()*80)+'vw';el.style.top=(20+Math.random()*60)+'vh';
    el.style.fontSize=(0.9+Math.random()*.8)+'rem';
    document.body.appendChild(el);setTimeout(()=>el.remove(),1400);
  },400);
}
function stopMusic(){
  if(!musicPlaying)return;
  musicPlaying=false;
  document.getElementById('music-indicator').classList.remove('on');
  clearTimeout(loopTimer);clearInterval(noteEffTimer);
  musicNodes.forEach(n=>{try{n.stop()}catch(e){}});
  musicNodes=[];
  btnStop.classList.remove('pulse');
}
function playElimSound(){
  const ctx=getCtx();if(ctx.state==='suspended')ctx.resume();
  const t=ctx.currentTime,o=ctx.createOscillator(),e=ctx.createGain();
  o.type='sawtooth';o.frequency.setValueAtTime(440,t);o.frequency.exponentialRampToValueAtTime(110,t+.6);
  e.gain.setValueAtTime(.4,t);e.gain.exponentialRampToValueAtTime(.001,t+.6);
  o.connect(e);e.connect(ctx.destination);o.start(t);o.stop(t+.65);
}
function playWinSound(){
  const ctx=getCtx();if(ctx.state==='suspended')ctx.resume();
  const f=[['C5',.12],['E5',.12],['G5',.12],['C6',.12],['E6',.12],['G6',.12],['C7',.4],['G6',.1],['A6',.1],['B6',.1],['C7',.5]];
  let t=ctx.currentTime;
  for(const[n,d]of f){playNote(ctx,noteToHz(n),t,d,.35,'triangle');t+=d;}
}

// ───────── ゲームロジック ─────────
const TOTAL=6;
const NAMES=['ポメ太','ポメ子','もふお','ふわ丸','ぽんた','まろん'];
let chairCount=5,eliminated=[],gameActive=false,round=1;

const canvas    = document.getElementById('stage-canvas');
const ctx2      = canvas.getContext('2d');
const stageWrap = document.getElementById('stage-wrap');
const statusEl  = document.getElementById('status');
const resultEl  = document.getElementById('result');
const btnStart  = document.getElementById('btnStart');
const btnStop   = document.getElementById('btnStop');
const btnReset  = document.getElementById('btnReset');
const scPom     = document.getElementById('sc-pom');
const scChair   = document.getElementById('sc-chair');
const roundBadge= document.getElementById('round-badge');
const scoreRow  = document.getElementById('chair-score-row');

const CX=150,CY=150;       // キャンバス中心
const POM_R=108;           // ポメ軌道半径
const CHAIR_R=62;          // 椅子軌道半径
const ORBIT_SPEED=0.6;     // rad/sec（基本速度）

// ポメの状態（角度はラジアン）
let pomAngles=[];          // 各ポメの現在角度
let pomSpeeds=[];          // 各ポメの角速度
let pomEls=[];             // DOM要素（絵文字）
let pomNameEls=[];
let pomWinner=-1;          // 勝者インデックス
let animFrameId=null;
let lastTime=null;

// ───────── Canvas描画 ─────────
function drawStage(){
  ctx2.clearRect(0,0,300,300);

  // 背景円
  const grad=ctx2.createRadialGradient(CX,CY,0,CX,CY,148);
  grad.addColorStop(0,'#fff8f0');
  grad.addColorStop(0.6,'#ffe8d4');
  grad.addColorStop(1,'#ffd4b0');
  ctx2.beginPath();ctx2.arc(CX,CY,148,0,Math.PI*2);
  ctx2.fillStyle=grad;ctx2.fill();
  ctx2.strokeStyle='#ffcba4';ctx2.lineWidth=3;
  ctx2.setLineDash([8,6]);ctx2.stroke();ctx2.setLineDash([]);

  // ポメ軌道（点線トラック）
  ctx2.beginPath();ctx2.arc(CX,CY,POM_R,0,Math.PI*2);
  ctx2.strokeStyle='rgba(255,160,80,0.25)';ctx2.lineWidth=2;
  ctx2.setLineDash([5,7]);ctx2.stroke();ctx2.setLineDash([]);

  // 椅子を描画
  const alive=TOTAL-eliminated.length;
  for(let i=0;i<chairCount;i++){
    const a=(i/chairCount)*Math.PI*2 - Math.PI/2;
    const x=CX+Math.cos(a)*CHAIR_R;
    const y=CY+Math.sin(a)*CHAIR_R;
    ctx2.font='1.5rem serif';
    ctx2.textAlign='center';ctx2.textBaseline='middle';
    ctx2.fillText('🪑',x,y);
  }

  // 中央に肉球
  ctx2.font='1.2rem serif';
  ctx2.globalAlpha=0.18;
  ctx2.fillText('🐾',CX,CY);
  ctx2.globalAlpha=1;
}

// ───────── ポメDOM要素 ─────────
function createPomEls(){
  // 既存削除
  pomEls.forEach(e=>e&&e.remove());
  pomNameEls.forEach(e=>e&&e.remove());
  pomEls=[];pomNameEls=[];

  const alive=[];
  for(let i=0;i<TOTAL;i++) if(!eliminated.includes(i)) alive.push(i);

  pomAngles=new Array(TOTAL).fill(0);
  pomSpeeds=new Array(TOTAL).fill(0);

  for(let i=0;i<TOTAL;i++){
    const isOut=eliminated.includes(i);
    // 初期角度：均等配置
    const order=isOut?i:alive.indexOf(i);
    const total=isOut?TOTAL:alive.length;
    pomAngles[i]=(order/total)*Math.PI*2 - Math.PI/2;
    // 速さは微妙にランダム差
    pomSpeeds[i]=ORBIT_SPEED*(1+(Math.random()-.5)*.08);

    // 絵文字DOM
    const el=document.createElement('div');
    el.className='pom-el'+(isOut?' eliminated':'');
    el.textContent='🐕';
    el.dataset.idx=i;
    stageWrap.appendChild(el);
    pomEls[i]=el;

    // 名前DOM
    const nameEl=document.createElement('div');
    nameEl.className='pom-name-el';
    nameEl.textContent=NAMES[i];
    if(isOut) nameEl.style.opacity='0';
    stageWrap.appendChild(nameEl);
    pomNameEls[i]=nameEl;
  }
  updatePomPositions();
}

function updatePomPositions(){
  for(let i=0;i<TOTAL;i++){
    if(!pomEls[i]) continue;
    const x=CX+Math.cos(pomAngles[i])*POM_R;
    const y=CY+Math.sin(pomAngles[i])*POM_R;
    pomEls[i].style.left=x+'px';
    pomEls[i].style.top=y+'px';
    // 名前ラベルは少し下
    if(pomNameEls[i]){
      pomNameEls[i].style.left=x+'px';
      pomNameEls[i].style.top=(y+26)+'px';
    }
  }
}

// ───────── アニメーションループ ─────────
function animLoop(ts){
  if(!lastTime) lastTime=ts;
  const dt=Math.min((ts-lastTime)/1000,.05); // cap at 50ms
  lastTime=ts;

  if(gameActive){
    for(let i=0;i<TOTAL;i++){
      if(eliminated.includes(i)) continue;
      pomAngles[i]+=pomSpeeds[i]*dt;
    }
    updatePomPositions();
  }

  // 待機中もゆらゆら（bobアニメ）
  if(!gameActive){
    for(let i=0;i<TOTAL;i++){
      if(!pomEls[i]||eliminated.includes(i)) continue;
      const bob=Math.sin(ts*.002+i*1.1)*0.04; // スケールぴょこぴょこ
      pomEls[i].style.transform=`translate(-50%,-50%) scale(${1+bob}) rotate(${bob*80}deg)`;
    }
  } else {
    // 回転中は正立
    for(let i=0;i<TOTAL;i++){
      if(!pomEls[i]||eliminated.includes(i)) continue;
      const bounce=Math.sin(ts*.006+i)*2;
      pomEls[i].style.transform=`translate(-50%,-50%) translateY(${bounce}px)`;
    }
  }

  // 勝者キラキラ
  if(pomWinner>=0&&pomEls[pomWinner]){
    const scale=1.2+Math.sin(ts*.005)*.15;
    pomEls[pomWinner].style.transform=`translate(-50%,-50%) scale(${scale}) rotate(${Math.sin(ts*.003)*12}deg)`;
    pomEls[pomWinner].style.filter=`drop-shadow(0 0 ${8+Math.sin(ts*.005)*6}px gold)`;
  }

  animFrameId=requestAnimationFrame(animLoop);
}

// ───────── 椅子スコア行 ─────────
function renderChairScore(){
  scoreRow.innerHTML='';
  for(let i=0;i<chairCount;i++){
    const s=document.createElement('span');s.textContent='🪑';scoreRow.appendChild(s);
  }
  scChair.textContent=chairCount;
  scPom.textContent=TOTAL-eliminated.length;
}

function updateStatus(msg,danger=false){
  statusEl.textContent=msg;
  statusEl.classList.toggle('danger',danger);
}
function updateRound(){roundBadge.textContent='ROUND '+round;}

// ───────── 突進→脱落アニメ ─────────
function doRushAnimation(loserIdx, cb){
  // ポメをぷるぷる
  for(let i=0;i<TOTAL;i++){
    if(eliminated.includes(i)||!pomEls[i]) continue;
    const el=pomEls[i];
    el.style.transition='transform .08s';
    let shakes=0;
    const shakeTimer=setInterval(()=>{
      const r=(Math.random()-.5)*14;
      const s=(Math.random()-.5)*10;
      el.style.transform=`translate(calc(-50% + ${r}px), calc(-50% + ${s}px)) scale(1.1)`;
      if(++shakes>8){clearInterval(shakeTimer);el.style.transition='';}
    },60);
  }

  // 椅子ハイライト
  drawStage(); // redraw chairs with glow handled via redraw
  setTimeout(()=>{
    // loser を消す
    if(pomEls[loserIdx]){
      pomEls[loserIdx].style.transition='transform .4s, opacity .4s';
      pomEls[loserIdx].style.transform='translate(-50%,-50%) scale(0) rotate(60deg)';
      pomEls[loserIdx].style.opacity='0';
    }
    if(pomNameEls[loserIdx]) pomNameEls[loserIdx].style.opacity='0';
    // 爆発
    showBoom(loserIdx);
    setTimeout(cb,400);
  },600);
}

function showBoom(idx){
  if(!pomEls[idx]) return;
  const wrapRect=stageWrap.getBoundingClientRect();
  const x=CX+Math.cos(pomAngles[idx])*POM_R;
  const y=CY+Math.sin(pomAngles[idx])*POM_R;
  const boom=document.createElement('div');
  boom.className='boom';boom.textContent='💥';
  boom.style.left=(wrapRect.left+x-22)+'px';
  boom.style.top=(wrapRect.top+y-22)+'px';
  document.getElementById('effect-overlay').appendChild(boom);
  setTimeout(()=>boom.remove(),900);
}

function launchConfetti(){
  const area=document.getElementById('confetti-area');
  const colors=['#ff7c2a','#ffcc00','#ff3d5a','#a8e6cf','#88c0ff','#ffaacc'];
  for(let i=0;i<80;i++){
    const p=document.createElement('div');p.className='confetti-piece';
    p.style.left=Math.random()*100+'vw';
    p.style.background=colors[Math.floor(Math.random()*colors.length)];
    p.style.width=(7+Math.random()*8)+'px';p.style.height=(10+Math.random()*12)+'px';
    p.style.animationDuration=(1.8+Math.random()*2)+'s';
    p.style.animationDelay=(Math.random()*.8)+'s';
    area.appendChild(p);setTimeout(()=>p.remove(),4000);
  }
}

// ───────── ゲームフロー ─────────
function doStop(){
  if(!gameActive)return;
  gameActive=false;
  stopMusic();
  btnStart.disabled=true;btnStop.disabled=true;

  const aliveIndices=[];
  for(let i=0;i<TOTAL;i++) if(!eliminated.includes(i)) aliveIndices.push(i);
  const loserIdx=aliveIndices[Math.floor(Math.random()*aliveIndices.length)];

  updateStatus('🏃 取り合い中…！',true);

  doRushAnimation(loserIdx,()=>{
    playElimSound();
    eliminated.push(loserIdx);
    chairCount--;
    statusEl.classList.remove('danger');
    renderChairScore();
    drawStage();

    const remaining=TOTAL-eliminated.length;
    if(remaining===1){
      const winner=aliveIndices.find(i=>i!==loserIdx);
      pomWinner=winner;
      updateStatus('🏆 '+NAMES[winner]+'が優勝！！ 🎉');
      resultEl.textContent='👑 '+NAMES[winner]+' が椅子取りチャンピオン！ 👑';
      launchConfetti();playWinSound();
    } else {
      updateStatus('😢 '+NAMES[loserIdx]+'が脱落！ 残り'+remaining+'匹');
      resultEl.textContent='';
      round++;updateRound();
      setTimeout(()=>{
        btnStart.disabled=false;
        updateStatus('次のラウンド！ 残り'+remaining+'匹 / 椅子'+chairCount+'脚');
      },1200);
    }
  });
}

btnStart.addEventListener('click',()=>{
  if(chairCount<1||TOTAL-eliminated.length<=1)return;
  gameActive=true;btnStart.disabled=true;btnStop.disabled=false;
  // ラウンドが進むほど速く
  const speedMul=1+((TOTAL-1)-(TOTAL-eliminated.length))*0.15;
  for(let i=0;i<TOTAL;i++) pomSpeeds[i]=ORBIT_SPEED*speedMul*(1+(Math.random()-.5)*.08);
  updateStatus('🎵 ぐるぐる回ってる… いつ止まる？！');
  resultEl.textContent='';
  startMusic();
});

btnStop.addEventListener('click',()=>{if(gameActive)doStop();});

btnReset.addEventListener('click',()=>{
  stopMusic();
  gameActive=false;eliminated=[];chairCount=TOTAL-1;round=1;pomWinner=-1;
  resultEl.textContent='';btnStart.disabled=false;btnStop.disabled=true;
  updateStatus('「スタート」を押して始めよう！');
  updateRound();
  createPomEls();
  renderChairScore();
  drawStage();
});

// ───────── 初期化 ─────────
createPomEls();
renderChairScore();
drawStage();
lastTime=null;
animFrameId=requestAnimationFrame(animLoop);
</script>
