<!DOCTYPE html>
<html lang="ja">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

    .visual-content img { width: 100%; height: auto; border-radius: 15px; }
    .info-section { padding: 30px; line-height: 1.6; color: #ccc; }
    h2 { color: #00cccc; }
</style>
</head>
<body>

<header class="hero">
    <h1>BLAUND</h1>
    <p>人間の移動とカプセル化の未来。</p>
</header>

<div class="visual-content">
    <img src="1000002812.png" alt="BLAUND Vision">
</div>

<div class="info-section">
    <h2>次世代モビリティシステム</h2>
    <p>4Wayストレッチ素材と統合型ソーラーアレイを搭載した、全天候型テクノロジーウェアです。</p>
</div>

</body>
</html>
