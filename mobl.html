<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BLAUND | Next-Gen Mobility System</title>
  <style>
    /* 基本スタイル */
    body { background: #050505; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
    .container { max-width: 1200px; margin: 0 auto; padding: 20px; text-align: center; }
    h1 { color: #00cccc; font-size: 2.5rem; margin-bottom: 10px; }
    p.subtitle { color: #888; margin-bottom: 50px; }

    /* 画像ギャラリー・パネル配置 */
    .showcase-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
      gap: 30px;
    }
    .panel {
      background: #111;
      border: 1px solid #222;
      border-radius: 16px;
      padding: 15px;
      transition: transform 0.4s ease;
    }
    .panel:hover { transform: translateY(-10px); border-color: #00cccc; }
    .panel img { width: 100%; border-radius: 8px; }

    /* CTAボタン */
    .cta-section { margin-top: 60px; padding: 40px; }
    .btn {
      padding: 15px 40px; border: 1px solid #00cccc; background: transparent;
      color: #00cccc; cursor: pointer; font-size: 1rem; transition: 0.3s;
    }
    .btn:hover { background: #00cccc; color: #000; }
  </style>
</head>
<body>

<div class="container">
  <h1>BLAUND</h1>
  <p class="subtitle">境界を溶かし、未来をまとう。次世代型ウェアラブル・環境適応システム</p>

  <div class="showcase-grid">
    <div class="panel"><img src="1000002815.jpg" alt="Technical Manual"></div>
    <div class="panel"><img src="1000002816.jpg" alt="Casual Style"></div>
    <div class="panel"><img src="1000002817.jpg" alt="Brand Vision"></div>
  </div>

  <div class="cta-section">
    <button class="btn">カタログをダウンロード</button>
  </div>
</div>

</body>
</html>
