<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <style>
        body { background-color: #0d1117; color: #fff; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        .container { width: 100%; max-width: 400px; }
        h1 { text-align: center; color: #00f2ff; font-size: 1.5em; }
        .card { border: 2px solid #30363d; border-radius: 15px; padding: 20px; margin-bottom: 20px; background: #161b22; }
        .card.active { border-color: #ff00ff; }
        h2 { margin: 0 0 10px 0; font-size: 1.2em; }
        p { color: #8b949e; margin-bottom: 15px; }
        .step { background: #0d1117; border: 1px solid #ff00ff; color: #ff00ff; padding: 5px 10px; border-radius: 5px; font-size: 0.8em; display: inline-block; }
    </style>
</head>
<body>
    <div class="container">
        <h1>MIC VICTORY // TOOL CHAIN</h1>
        
        <div class="card">
            <h2>HuggingFace Spaces</h2>
            <p>画像生成 (FLUX / SD系)</p>
            <div class="step">STEP 1: IMAGE</div>
        </div>

        <div class="card">
            <h2>Pixverse.ai</h2>
            <p>image-to-video 変換</p>
            <div class="step">STEP 2: VIDEO</div>
        </div>

        <div class="card active">
            <h2>CapCut</h2>
            <p>吹き出し・編集・書き出し</p>
            <div class="step">STEP 3: EDIT</div>
        </div>

        <div class="card">
            <h2>VN App</h2>
            <p>エクスポート代替 (無料枠回避)</p>
            <div class="step">STEP 3: EXPORT</div>
        </div>
    </div>
</body>
</html>
